# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    db.host: '%env(DB_HOST)%'
    db.port: '%env(DB_PORT)%'
    db.database: '%env(DB_NAME)%'
    db.user: '%env(DB_USER)%'
    db.password: '%env(DB_PASSWORD)%'
    secret_key: '%env(SECRET_KEY)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Infrastructure\Api\Controller\:
        resource: '../src/Infrastructure/Api/Controller/'
        tags: [ 'controller.service_arguments' ]

    App\Infrastructure\Storage\Pdo\Mysql\MysqlPdoConnection:
        arguments:
            $host: '%db.host%'
            $port: '%db.port%'
            $databaseName: '%db.database%'
            $userName: '%db.user%'
            $password: '%db.password%'

    App\Application\Password\PasswordEncrypter:
        arguments:
            $secretKey: '%secret_key%%'

    # one of 3 password strategies are available in order to change password before storing to database
    # 1) App\Application\Password\EncryptedPasswordStrategy - save password encrypted
    # 2) App\Application\Password\HashedPasswordStrategy - save password hash
    # 3) App\Application\Password\PlainPasswordStrategy - save password as plain text without modifications
    App\Application\Password\EncryptedPasswordStrategy: ~
    App\Application\Password\HashedPasswordStrategy: ~
    App\Application\Password\PlainPasswordStrategy:
        public: true

    # assign the password strategy you want to use to the App\Application\Password\PasswordStrategyInterface interface
    App\Application\Password\PasswordStrategyInterface: '@App\Application\Password\EncryptedPasswordStrategy'
    # App\Application\Password\PasswordStrategyInterface: '@App\Application\Password\HashedPasswordStrategy'
    # App\Application\Password\PasswordStrategyInterface: '@App\Application\Password\PlainPasswordStrategy'

    App\Infrastructure\Storage\Pdo\Mysql\MysqlCommandExecutor: ~
    App\Infrastructure\Storage\Pdo\Repository\PdoUserRepository: ~
    App\Infrastructure\Storage\Pdo\Repository\PdoTokenRepository: ~
    App\Infrastructure\Storage\Pdo\Repository\PdoRoleRepository: ~
    App\Infrastructure\Storage\Pdo\Connection\PdoConnectionInterface: '@App\Infrastructure\Storage\Pdo\Mysql\MysqlPdoConnection'
    App\Domain\Repository\UserRepositoryInterface: '@App\Infrastructure\Storage\Pdo\Repository\PdoUserRepository'
    App\Domain\Repository\TokenRepositoryInterface: '@App\Infrastructure\Storage\Pdo\Repository\PdoTokenRepository'
    App\Domain\Repository\RoleRepositoryInterface: '@App\Infrastructure\Storage\Pdo\Repository\PdoRoleRepository'


